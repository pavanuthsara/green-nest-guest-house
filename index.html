<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4a7c59" />

    <!-- ═══ Primary SEO Meta Tags ═══ -->
    <title>Green Nest Guest House – Peaceful Tropical Stay & Long-Term Rental in Weligama, Sri Lanka</title>

      name="description"
      content="Green Nest is a cozy, independent guest house in Weligama, Sri Lanka. Perfect for digital nomads, solo travelers, and couples seeking long-term coastal stays. Private entrance, high-speed Wi-Fi, outdoor kitchen, and special monthly discounts."
    />
    <meta name="keywords" content="guest house Weligama, Weligama long-term rental, digital nomad Sri Lanka, coastal stay Weligama, Green Nest guest house, surf stay Weligama, budget accommodation Weligama, monthly rental Weligama Sri Lanka" />
    <meta name="author" content="Green Nest Guest House" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://greennest.lk/" />

    <!-- ═══ Open Graph / Social ═══ -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://greennest.lk/" />
    <meta property="og:title" content="Green Nest Guest House – Weligama, Sri Lanka" />
    <meta property="og:description" content="A cozy, independent sanctuary for digital nomads, solo travelers, and couples in Weligama. Special discounts for monthly stays." />
    <meta property="og:image" content="https://greennest.lk/og-image.jpg" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Green Nest Guest House" />

    <!-- ═══ Twitter Card ═══ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Green Nest Guest House – Peaceful Tropical Stay in Weligama" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />

        "@type": "PostalAddress",
        "streetAddress": "Weligama",
        "addressLocality": "Weligama",
        "addressRegion": "Southern Province",
        "addressCountry": "LK"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": "5.9746",
        "longitude": "80.4294"
      },
      "telephone": "+94714169537",
      "email": "stay@greennest.lk",
      "image": "https://greennest.lk/og-image.jpg",

        { "@type": "LocationFeatureSpecification", "name": "Free Wi-Fi", "value": true },

      "availableLanguage": ["English", "Sinhala"],
